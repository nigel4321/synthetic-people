name: Tests

"on":
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synthetic-people:
    name: synthetic_people (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: synthetic_people/requirements.txt

      - name: Install htslib binaries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bcftools tabix

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r synthetic_people/requirements.txt
          # pyarrow is a *conditional* dep at runtime (Phase 5d.1
          # cohort-mode arrow path; n>=100k workloads). For CI we
          # install it explicitly so the @skipUnless(HAS_PYARROW, ...)
          # gates don't silently hide failures in the Arrow round-
          # trip / parity / cli integration tests.
          pip install pyarrow

      # M12 (default-on FASTA) + ClinVar cache.
      #
      # The cli auto-downloads the Ensembl primary FASTA (~900 MB
      # gzipped → ~3.1 GB on disk) and the build's ClinVar VCF
      # (~70 MB) into ``--cache-dir`` on first run. Without a
      # cross-run cache, every CI job would re-pull both — slow
      # and a real load on Ensembl/NCBI FTP. The unit-test suite
      # itself opts out via ``--no-reference-fasta`` and uses
      # per-test temp cache_dirs, so this cache restore is a
      # no-op for the current tests. It's wired up here so:
      #
      # (a) any new smoke / e2e / benchmark job that DOES use real
      #     REF or ClinVar will get a populated cache for free, and
      # (b) the pattern is documented in one place — downstream
      #     users running this cli in their own GitHub Actions
      #     workflows can copy the block verbatim.
      #
      # Cache key versioning: bump the ``-v1`` suffix when the
      # cli changes either source URL or the on-disk layout. The
      # cli writes ``cache_dir/reference/<BUILD>.fa[.fai]`` and
      # ``cache_dir/clinvar/clinvar_<BUILD>.vcf.gz[.tbi]``, both
      # idempotent — a cache hit is a pure read.
      - name: Cache reference FASTA + ClinVar
        uses: actions/cache@v4
        with:
          path: ~/.cache/synthetic_people
          key: synth-people-data-${{ runner.os }}-grch38-v1

      - name: Run unit tests
        run: python .github/scripts/run_tests.py synthetic_people

  nextflow-pipeline:
    name: nextflow_pipeline bin scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install htslib binaries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bcftools tabix

      # Install the pipeline-stage Python deps so the corresponding
      # tests don't skip silently. Without this, test_plot_pca and
      # test_qc_validate self-skip on missing numpy / sklearn /
      # matplotlib / multiqc — and a regression in plot_pca.py or
      # qc_validate.py would never fail CI. Same skip-hiding-bugs
      # failure mode the Phase 5d.1 / pyarrow bug taught us about.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r nextflow_pipeline/bin/requirements.txt

      # Nextflow is required by tests/test_pipeline_e2e.py — without
      # it the e2e test silently skips via fixtures.require_tools.
      # The pipeline itself runs local-exec with no container
      # directives (verified in main.nf + modules/*), so we only
      # need nextflow itself + Java (pre-installed on ubuntu-latest).
      # v3 (released 2026-04-17) upgrades to Node 24 and flattens
      # the composite action — removing the Node-20 deprecation
      # warnings for `./setup-nextflow/subaction` + the transitive
      # `actions/checkout` / `actions/setup-java` SHAs v2 pinned.
      - name: Set up Nextflow
        uses: nf-core/setup-nextflow@v3

      - name: Run unit tests
        run: python .github/scripts/run_tests.py nextflow_pipeline
